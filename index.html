<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

    <h1>Music Player</h1>

    <div class="song-info">
        <h2 id="title">Song Title</h2>
        <p id="artist">Artist Name</p>
    </div>

    <audio id="audio"></audio>

    <!-- Progress Bar -->
    <input type="range"
           id="progress"
           value="0">

    <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <!-- Controls -->
    <div class="controls">

        <button onclick="prevSong()">
            ⏮
        </button>

        <button onclick="playPause()"
                id="playBtn">
            ▶
        </button>

        <button onclick="nextSong()">
            ⏭
        </button>

    </div>

    <!-- Volume -->
    <div class="volume-box">

        <label>🔊 Volume</label>

        <input type="range"
               id="volume"
               min="0"
               max="1"
               step="0.1"
               value="1">

    </div>

    <!-- Playlist -->
    <div class="playlist">
        <h3>Playlist</h3>
        <ul id="playlist"></ul>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
